services:
- type: web
name: farmai-backend
runtime: python
rootDir: backend
buildCommand: pip install -r requirements.cloud.txt
startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
plan: free
autoDeploy: true
healthCheckPath: /docs
envVars:
- key: DATABASE_URL
sync: false
- key: SECRET_KEY
sync: false
- key: SMTP_EMAIL
sync: false
- key: SMTP_PASSWORD
sync: false
- key: GROQ_API_KEY
sync: false
- key: CORS_ORIGINS
sync: false
- key: WHATSAPP_TOKEN
sync: false
- key: WHATSAPP_PHONE_ID
sync: false
