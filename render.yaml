services:
  - type: web
    name: farmai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.cloud.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - {key: LITE_MODE, value: "true"}
      - {key: DATABASE_URL, value: ""}
      - {key: SECRET_KEY, value: ""}
      - {key: SMTP_EMAIL, value: ""}
      - {key: SMTP_PASSWORD, value: ""}
      - {key: GROQ_API_KEY, value: ""}
      - {key: CORS_ORIGINS, value: "https://smart-farm-tan.vercel.app,http://localhost:5173"}
      - {key: WHATSAPP_TOKEN, value: ""}
      - {key: WHATSAPP_PHONE_ID, value: ""}
      
