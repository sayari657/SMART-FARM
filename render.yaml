services:
- type: web
name: farmai-backend
runtime: python
rootDir: backend
buildCommand: pip install -r requirements.cloud.txt
startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
plan: free
autoDeploy: true
healthCheckPath: /docs
envVars:
- key: DATABASE_URL
- key: SECRET_KEY
- key: SMTP_EMAIL
- key: SMTP_PASSWORD
- key: GROQ_API_KEY
- key: CORS_ORIGINS
- key: WHATSAPP_TOKEN
- key: WHATSAPP_PHONE_ID
