<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <script>
      /* Apply dark mode before React mounts to avoid FOUC */
      (function() { if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark'); })();
    </script>
    <script>
      (function() {
        const originalWarn = console.warn;
        const originalLog = console.log;
        const originalError = console.error;
        const suppress = [
          'X4122',
          'THREE.WebGLProgram: Program Info Log',
          'THREE.Clock: This module has been deprecated',
          'PCFSoftShadowMap has been deprecated',
          'KHR_materials_pbrSpecularGlossiness'
        ];
        const check = (args) => args.some(arg => typeof arg === 'string' && suppress.some(s => arg.includes(s)));

        console.warn = (...args) => { if (check(args)) return; originalWarn(...args); };
        console.log = (...args) => { if (check(args)) return; originalLog(...args); };
        console.error = (...args) => { if (check(args)) return; originalError(...args); };
      })();
    </script>

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Smart Farm AI</title>
    <meta name="description" content="Plateforme agricole intelligente — Monitoring temps réel, IA prédictive, gestion du bétail." />
    <meta name="theme-color" content="#16a34a" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA — Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA — iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FarmAI" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Apple PWA Splash Screens -->

    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
