<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <title>Hors ligne — Smart Farm AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f0fdf4;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(22, 163, 74, 0.12), 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid #dcfce7;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }

    .signal-off {
      display: inline-block;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      width: 100%;
      min-height: 48px;
      touch-action: manipulation;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.85; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fef2f2;
      color: #ef4444;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 9999px;
      margin-bottom: 20px;
      border: 1px solid #fecaca;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .tips {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #f0f4f8;
      text-align: left;
    }

    .tips-title {
      font-size: 12px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .tip {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #475569;
    }

    .tip-icon { flex-shrink: 0; font-size: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">🌿</div>

    <div class="badge">
      <span class="dot"></span>
      Connexion perdue
    </div>

    <h1>Smart Farm AI<br/>est hors ligne</h1>

    <p>
      Vérifiez votre connexion internet ou Wi-Fi,<br/>
      puis réessayez. Vos données locales sont sauvegardées.
    </p>

    <button class="btn" onclick="window.location.reload()">
      ↻ &nbsp;Réessayer la connexion
    </button>

    <div class="tips">
      <div class="tips-title">En attendant</div>
      <div class="tip"><span class="tip-icon">📊</span> Les données déjà chargées restent accessibles</div>
      <div class="tip"><span class="tip-icon">💾</span> Les actions seront synchronisées au retour</div>
      <div class="tip"><span class="tip-icon">📶</span> Activez le Wi-Fi ou les données mobiles</div>
    </div>
  </div>
</body>
</html>
