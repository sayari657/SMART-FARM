# FARM AI — Production Docker Compose
# Runs the full stack: PostgreSQL + FastAPI backend + nginx/React frontend.
#
# QUICK START
#   1. cp .env.production.example .env.production   (fill in secrets)
#   2. docker compose --env-file .env.production up -d --build
#   3. Open http://<server-ip>  (or your domain if Caddy/nginx is in front)
#
# HTTPS WITH A DOMAIN (Caddy — zero-config SSL)
#   See the caddy service block at the bottom. Uncomment it and set
#   DOMAIN= in .env.production to get automatic Let's Encrypt certs.
#
# LITE MODE (SQLite instead of PostgreSQL — simpler but single-instance only)
#   Set DATABASE_URL=sqlite:////data/smart_farm.db in .env.production
#   and remove/comment out the db service and the db dependency.

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME:-smart_farm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-smart_farm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-admin}:${DB_PASSWORD}@db:5432/${DB_NAME:-smart_farm}
      MQTT_BROKER:  broker.hivemq.com   # public broker — swap for self-hosted
      MQTT_PORT:    "1883"
    volumes:
      - ./iot:/app/iot:ro              # IoT CSV files (read-only)
      - sqlite_data:/data              # used only in SQLite mode
    expose:
      - "8000"
    # No --reload in production
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]

  # ── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # VITE_API_URL intentionally empty → relative /api/v1 paths
      # nginx proxies them to the backend container internally
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"      # HTTP — put Caddy in front for HTTPS

  # ── Caddy (automatic HTTPS) — uncomment when you have a domain ─────────────
  # caddy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - frontend
  #     - backend

volumes:
  postgres_data:
  sqlite_data:
  # caddy_data:
  # caddy_config:
